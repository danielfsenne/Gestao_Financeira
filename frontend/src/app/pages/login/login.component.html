<div class="auth-container">
  <div class="auth-bg">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>
  </div>

  <div class="auth-card">
    <div class="auth-header">
      <div class="auth-logo">
        <mat-icon>account_balance_wallet</mat-icon>
      </div>
      <h1>Bem-vindo de volta</h1>
      <p>Entre na sua conta para continuar</p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="auth-form">
      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Email</mat-label>
        <input matInput type="email" formControlName="email" placeholder="seu@email.com" />
        <mat-icon matSuffix>email</mat-icon>
        <mat-error *ngIf="form.get('email')?.hasError('required')">Email obrigatório</mat-error>
        <mat-error *ngIf="form.get('email')?.hasError('email')">Email inválido</mat-error>
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Senha</mat-label>
        <input matInput [type]="hidePassword ? 'password' : 'text'" formControlName="password" />
        <button mat-icon-button matSuffix type="button" (click)="hidePassword = !hidePassword">
          <mat-icon>{{ hidePassword ? 'visibility_off' : 'visibility' }}</mat-icon>
        </button>
        <mat-error *ngIf="form.get('password')?.hasError('required')">Senha obrigatória</mat-error>
      </mat-form-field>

      <div class="error-msg" *ngIf="error">
        <mat-icon>error_outline</mat-icon> {{ error }}
      </div>

      <button mat-flat-button class="submit-btn full-width" type="submit" [disabled]="loading">
        <mat-spinner diameter="20" *ngIf="loading" />
        <span *ngIf="!loading">Entrar</span>
      </button>
    </form>

    <p class="auth-footer">Não tem conta? <a routerLink="/register">Criar conta grátis</a></p>
  </div>
</div>
