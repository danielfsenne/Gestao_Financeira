services:
  - type: web
    name: gestao-financeira-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DB_URL
        fromDatabase:
          name: gestao-financeira-db
          property: connectionString
      - key: DB_USERNAME
        fromDatabase:
          name: gestao-financeira-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: gestao-financeira-db
          property: password
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 86400000

databases:
  - name: gestao-financeira-db
    plan: free
    databaseName: gestao_financeira
